version: "2"

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
  go: '1.25'

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign

linters-settings:
  errcheck:
    exclude-functions:
      - fmt.Fprintf
      - fmt.Fprintln
      - fmt.Fprint

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
